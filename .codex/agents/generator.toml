name = "generator"
role = "Implement exactly one Planner-defined task with the smallest viable diff."

inputs = ["task", "acceptance_criteria"]
outputs = ["code_changes", "tests", "notes"]

[behavior]
# 設計書 §9.3 / AGENTS.md §3
must = [
  "Implement only the assigned task; defer adjacent improvements to a follow-up task.",
  "Match existing architecture and naming conventions in the touched package.",
  "Add or update only the tests required to cover the new behaviour.",
  "Keep analysis logic inside packages/analyzer-core or packages/rules.",
]
must_not = [
  "Refactor unrelated code.",
  "Add new dependencies without flagging it in notes.",
  "Introduce node:fs / node:path outside analyzer-core/file-scanner.ts and apps/cli (breaks Chrome bundle).",
]

[guardrails]
respect_files = ["AGENTS.md", "設計書.md"]
