name: Security Scan

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read
  security-events: write
  pull-requests: write

jobs:
  # Self-scan: VibeGuard runs against its own repo to populate the Security tab
  # and PR comments. Rule sources and test fixtures contain literal example
  # payloads (eval(), dummy credentials, ...) — those are masked with
  # `vibeguard:disable-file` / `disable-line` pragmas in the source so the
  # severity gate below can stay strict.
  #
  # Severity gate:
  #   pull_request → fail on `high` or above
  #   push to main → fail on `critical` only (don't break main if a high slips
  #                   in; PRs should catch it first)
  self-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - run: npm run build

      - name: Pick severity gate
        id: gate
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "fail_on=high" >> "$GITHUB_OUTPUT"
          else
            echo "fail_on=critical" >> "$GITHUB_OUTPUT"
          fi

      - name: Run scanner (SARIF, non-failing)
        run: |
          node apps/cli/dist/index.js . \
            --mode standard \
            --format sarif \
            --out report.sarif \
            --ignore samples \
            --ignore dist \
            --ignore node_modules \
            --ignore .git \
            --ignore .github \
            --fail-on never

      - name: Run scanner (Markdown, non-failing)
        run: |
          node apps/cli/dist/index.js . \
            --format markdown \
            --out report.md \
            --ignore samples \
            --ignore dist \
            --ignore node_modules \
            --ignore .git \
            --ignore .github \
            --fail-on never

      - name: Upload SARIF to Code Scanning
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: report.sarif
          category: vibeguard

      - name: Post PR comment
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: vibeguard
          path: report.md

      - name: Enforce severity gate
        run: |
          node apps/cli/dist/index.js . \
            --mode standard \
            --format json \
            --out gate.json \
            --ignore samples \
            --ignore dist \
            --ignore node_modules \
            --ignore .git \
            --ignore .github \
            --fail-on ${{ steps.gate.outputs.fail_on }}

  # Quality gate: rule correctness against curated samples.
  # samples/safe MUST stay clean (no false positives).
  # samples/vulnerable MUST keep tripping the expected number of rules.
  samples:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - run: npm run build

      - name: samples/safe must produce zero findings
        run: |
          node apps/cli/dist/index.js samples/safe \
            --mode standard --format json --out safe.json --fail-on never
          COUNT=$(node -e "console.log(JSON.parse(require('fs').readFileSync('safe.json','utf8')).findings.length)")
          echo "samples/safe findings: $COUNT"
          test "$COUNT" -eq 0

      - name: samples/vulnerable must trip the rules
        run: |
          node apps/cli/dist/index.js samples/vulnerable \
            --mode standard --format json --out vuln.json --fail-on never
          COUNT=$(node -e "console.log(JSON.parse(require('fs').readFileSync('vuln.json','utf8')).findings.length)")
          echo "samples/vulnerable findings: $COUNT"
          test "$COUNT" -ge 15

  # PR diff scan: scan only the lines this PR touches. Complements the
  # whole-repo self-scan above by giving reviewers a tight, low-noise list
  # of "what's new in this PR". Runs on PRs only.
  pr-diff-scan:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Need history on both sides of the diff.
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - run: npm run build

      - name: Run diff scan (Markdown for PR comment)
        run: |
          node apps/cli/dist/index.js \
            --diff "origin/${{ github.base_ref }}...HEAD" \
            --mode standard \
            --format markdown \
            --out diff-report.md \
            --ignore samples \
            --fail-on never

      - name: Post diff-scan PR comment
        if: github.event.pull_request.head.repo.full_name == github.repository
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: vibeguard-diff
          path: diff-report.md

      # samples/ contains intentionally vulnerable fixtures that demonstrate
      # what each rule catches; the dedicated `samples` job above already
      # validates them. Excluding samples here keeps the PR gate focused on
      # real source changes (mirrors --ignore samples in self-scan).
      - name: Enforce diff-scan severity gate (high)
        run: |
          node apps/cli/dist/index.js \
            --diff "origin/${{ github.base_ref }}...HEAD" \
            --mode standard \
            --format json \
            --out diff.json \
            --ignore samples \
            --fail-on high
