name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0

      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - run: npm run build

      - run: npm test

  # Cross-channel judgment consistency (paper item ②). Proves the built node
  # entry (CLI / Action `scanPath`) and the built browser entry (Chrome / VS
  # Code `scan`) emit identical findings on the same inputs. Blocking: a
  # divergence means the four channels disagree, which is a correctness bug.
  consistency-e2e:
    runs-on: ubuntu-latest
    needs: build-test
    steps:
      - uses: actions/checkout@v7.0.0

      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci
      - run: npm run build

      - name: Assert node/browser paths agree
        run: node scripts/e1-consistency-eval.mjs >> "$GITHUB_STEP_SUMMARY"

  # Performance benchmark. Non-blocking by default — it fails only when a
  # workload exceeds 2× its design-§11.1 target (see scripts/perf-bench.mjs).
  # The JSON output is uploaded as an artifact so a future PR can plot trends.
  perf-bench:
    runs-on: ubuntu-latest
    # Don't wedge the merge queue on a noisy CI VM. The hard 2× gate is the
    # real guard; the soft target is just for the artifact.
    continue-on-error: true
    needs: build-test
    steps:
      - uses: actions/checkout@v7.0.0

      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci
      - run: npm run build

      - name: Run perf benchmark
        run: npm run bench -- --json > perf-bench.json
        # Even if a workload "fails" (exceeds 2× target), we still want the
        # artifact so the trend is visible. The exit code is preserved via
        # continue-on-error at the job level.

      - name: Render human-readable summary
        if: always()
        run: |
          echo '## VibeGuard perf bench' >> "$GITHUB_STEP_SUMMARY"
          echo '' >> "$GITHUB_STEP_SUMMARY"
          npm run --silent bench >> "$GITHUB_STEP_SUMMARY" || true

      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: perf-bench
          path: perf-bench.json
          retention-days: 30
